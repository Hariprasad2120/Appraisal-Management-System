<!DOCTYPE html>
<html>
<head><title>Frame Extractor</title></head>
<body>
<video id="v" style="display:none" crossorigin="anonymous"></video>
<canvas id="c"></canvas>
<div id="out"></div>
<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

fetch('uploads/82228fe85ee27b02514d94f31a7361e6-aab8a84a.mp4')
  .then(r => r.blob())
  .then(blob => {
    video.src = URL.createObjectURL(blob);
    video.load();
    video.addEventListener('loadedmetadata', () => {
      document.getElementById('out').textContent = 'Duration: ' + video.duration + 's';
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    });
  });

window.captureAt = function(t) {
  return new Promise(resolve => {
    video.currentTime = t;
    video.addEventListener('seeked', function handler() {
      video.removeEventListener('seeked', handler);
      ctx.drawImage(video, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.8));
    });
  });
};
</script>
</body>
</html>
