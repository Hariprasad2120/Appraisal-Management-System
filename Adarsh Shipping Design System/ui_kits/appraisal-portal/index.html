<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adarsh Shipping — Appraisal Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #0e8a95; --teal-light: #0ea5b0; --cyan: #00cec4;
    --orange: #ff8333; --amber: #ffaa2d; --green: #22c55e; --red: #ef4444;
    --bg: #f4f6f9; --surface: #ffffff; --border: #e4eaf2;
    --fg1: #0d1117; --fg2: #374151; --fg3: #6b7280; --fg4: #9ca3af;
    --muted: #f0f4f8; --input: #f0f4f8;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
    --font: 'DM Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  html, body, #root { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--fg1); -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="StatCard.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="EmployeeView.jsx"></script>
<script type="text/babel" src="LoginPage.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState('login');
  const [role, setRole] = useState('ADMIN');
  const [darkMode, setDarkMode] = useState(false);

  // expose role setter for Header's select
  window.__setRole = (r) => { setRole(r); setPage('dashboard'); };

  const handleLogin = (selectedRole) => {
    setRole(selectedRole);
    setPage('dashboard');
  };

  React.useEffect(() => {
    document.documentElement.style.setProperty('--bg', darkMode ? '#0f1117' : '#f4f6f9');
    document.documentElement.style.setProperty('--surface', darkMode ? '#181d27' : '#ffffff');
    document.documentElement.style.setProperty('--border', darkMode ? '#252d3d' : '#e4eaf2');
    document.documentElement.style.setProperty('--fg1', darkMode ? '#e8ecf0' : '#0d1117');
    document.documentElement.style.setProperty('--fg2', darkMode ? '#c5cdd8' : '#374151');
    document.documentElement.style.setProperty('--fg3', darkMode ? '#6b7280' : '#6b7280');
    document.documentElement.style.setProperty('--muted', darkMode ? '#1e2433' : '#f0f4f8');
    document.documentElement.style.setProperty('--input', darkMode ? '#1a2030' : '#f0f4f8');
  }, [darkMode]);

  if (page === 'login') return <LoginPage onLogin={handleLogin} darkMode={darkMode} setDarkMode={setDarkMode} />;

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar role={role} page={page} setPage={setPage} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <Header role={role} darkMode={darkMode} setDarkMode={setDarkMode} setPage={setPage} page={page} />
        <main style={{ flex: 1, overflowY: 'auto', padding: '28px 32px' }}>
          {(page === 'dashboard' || page === 'employees' || page === 'cycles' || page === 'slabs' || page === 'extensions' || page === 'tickets' || page === 'salary' || page === 'criteria') && role !== 'EMPLOYEE' ? (
            <AdminDashboard setPage={setPage} role={role} />
          ) : (page === 'employee' || role === 'EMPLOYEE') ? (
            <EmployeeView setPage={setPage} />
          ) : (
            <AdminDashboard setPage={setPage} role={role} />
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
