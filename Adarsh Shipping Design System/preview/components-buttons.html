<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin: 0; padding: 28px 24px;
    background: #eef0f5;
    font-family: var(--font-sans);
    display: flex; flex-direction: column; gap: 24px; align-items: flex-start;
  }
  .lbl { font-size: 10px; color: #9ca3af; font-family: var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ── Shared reset ── */
  button { cursor: pointer; outline: none; font-family: var(--font-sans); white-space: nowrap; transition: all 0.16s cubic-bezier(0.25,0.46,0.45,0.94); }
  button:active { transform: scale(0.97) translateY(1px) !important; }

  /* ══ PILL BUTTONS (rounded) ══ */
  .pill {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    padding: 0 26px; height: 46px; border-radius: 9999px;
    font-size: 13px; font-weight: 500;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: none; /* no shadow at rest */
    position: relative; overflow: hidden;
  }
  .pill::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
    border-radius: inherit; pointer-events: none;
  }
  .pill > * { position: relative; z-index: 1; }

  /* dark fill */
  .pill-dark { background: #1e2130; color: #fff; }
  .pill-dark:hover { background: #252840; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.28); }

  /* teal accent */
  .pill-teal { background: rgba(14,137,149,0.14); color: #2dd4bf; border-color: rgba(14,137,149,0.3); }
  .pill-teal:hover { background: rgba(14,137,149,0.24); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(14,137,149,0.2); }

  /* warm accent */
  .pill-warm { background: rgba(255,131,51,0.12); color: #fb923c; border-color: rgba(255,131,51,0.28); }
  .pill-warm:hover { background: rgba(255,131,51,0.22); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,131,51,0.2); }

  /* ghost */
  .pill-ghost { background: transparent; color: #6b7280; border-color: rgba(255,255,255,0.0); }
  .pill-ghost:hover { background: rgba(255,255,255,0.45); color: #374151; border-color: rgba(200,210,225,0.7); transform: translateY(-1px); }

  /* ══ SQUARED BUTTONS ══ */
  .sq {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 0 18px; height: 38px; border-radius: 4px;
    font-size: 13px; font-weight: 500;
    box-shadow: none; /* no shadow at rest */
  }

  .sq-dark { background: #1e2130; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
  .sq-dark:hover { background: #252840; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.22); }

  .sq-teal { background: transparent; color: #2dd4bf; border: 1px solid rgba(14,137,149,0.45); }
  .sq-teal:hover { background: rgba(14,137,149,0.1); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(14,137,149,0.18); }

  .sq-warm { background: transparent; color: #fb923c; border: 1px solid rgba(255,131,51,0.42); }
  .sq-warm:hover { background: rgba(255,131,51,0.08); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(255,131,51,0.18); }

  .sq-ghost { background: transparent; color: #6b7280; border: 1px solid rgba(100,110,130,0.25); }
  .sq-ghost:hover { background: rgba(255,255,255,0.5); color: #374151; transform: none; }

  .sq-danger { background: transparent; color: #f87171; border: 1px solid rgba(239,68,68,0.42); }
  .sq-danger:hover { background: rgba(239,68,68,0.08); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(239,68,68,0.18); }

  /* shared sizes */
  .btn-sm { height: 32px !important; padding: 0 14px !important; font-size: 12px !important; }
  .btn-xs { height: 26px !important; padding: 0 10px !important; font-size: 11px !important; }

  /* status dot */
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-red    { background: #ef4444; box-shadow: 0 0 5px rgba(239,68,68,0.7); }
  .dot-teal   { background: linear-gradient(135deg,#0e8a95,#00cec4); box-shadow: 0 0 5px rgba(14,137,149,0.65); }
  .dot-orange { background: linear-gradient(135deg,#ff8333,#ffaa2d); box-shadow: 0 0 5px rgba(255,131,51,0.6); }
  .dot-green  { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.6); }

  svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 3-state launch demo */
  .launch-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 0 28px; height: 46px; border-radius: 9999px;
    background: #1e2130; color: #fff;
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    border: 1px solid rgba(255,255,255,0.08); box-shadow: none;
    cursor: pointer; outline: none; min-width: 160px; transition: all 0.18s ease;
    position: relative; overflow: hidden; white-space: nowrap;
  }
  .launch-btn:hover:not(:disabled) { background: #252840; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.28); }
  .launch-btn:disabled { cursor: default; transform: none !important; }
  @keyframes rocketLaunch { 0%{transform:translateY(50px) scale(0.7);opacity:0} 30%{transform:translateY(0) scale(1);opacity:1} 70%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-50px) scale(0.7);opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
  .rocket-anim { animation: rocketLaunch 1.2s ease forwards; font-size: 18px; }
  .success-content { animation: fadeIn 0.3s ease forwards; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<!-- Animated 3-state -->
<div>
  <div class="lbl">interactive — click to animate</div>
  <button class="launch-btn" id="launchBtn" onclick="runLaunch()">
    <span class="dot dot-red" id="launchDot"></span>
    <span id="launchText">Launch Site</span>
  </button>
</div>

<!-- Pill variants -->
<div>
  <div class="lbl">pill — rounded</div>
  <div class="row">
    <button class="pill pill-dark"><span class="dot dot-teal"></span> Sign in</button>
    <button class="pill pill-teal"><span class="dot dot-teal"></span> View details</button>
    <button class="pill pill-warm"><span class="dot dot-orange"></span> Assign</button>
    <button class="pill pill-ghost">Cancel</button>
    <button class="pill pill-dark" style="opacity:0.55;pointer-events:none">
      <svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.2-8.56" stroke-linecap="round"/></svg> Saving…
    </button>
  </div>
</div>

<!-- Squared variants -->
<div>
  <div class="lbl">squared — 4px radius</div>
  <div class="row">
    <button class="sq sq-dark"><span class="dot dot-teal"></span> Sign in</button>
    <button class="sq sq-teal"><span class="dot dot-teal"></span> View details</button>
    <button class="sq sq-warm"><span class="dot dot-orange"></span> Assign</button>
    <button class="sq sq-ghost">Cancel</button>
    <button class="sq sq-danger"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg> Delete</button>
  </div>
</div>

<!-- Sizes -->
<div>
  <div class="lbl">sizes</div>
  <div class="row" style="align-items:center">
    <button class="pill pill-dark" style="height:52px;padding:0 32px;font-size:15px"><span class="dot dot-teal"></span> Large</button>
    <button class="pill pill-dark"><span class="dot dot-teal"></span> Default</button>
    <button class="sq sq-dark btn-sm"><span class="dot dot-teal"></span> Small</button>
    <button class="sq sq-dark btn-xs"><span class="dot dot-teal"></span> XSmall</button>
  </div>
</div>

<script>
let launchState = 'idle';
function runLaunch() {
  if (launchState !== 'idle') return;
  launchState = 'loading';
  const btn = document.getElementById('launchBtn');
  const dot = document.getElementById('launchDot');
  const txt = document.getElementById('launchText');
  dot.style.display = 'none';
  txt.innerHTML = '<span class="rocket-anim">🚀</span>';
  btn.disabled = true;
  setTimeout(() => {
    dot.style.display = 'none';
    txt.innerHTML = '<span class="success-content"><svg width="13" height="13" stroke="#60a5fa" fill="none" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span style="color:#60a5fa">Site live</span></span>';
    launchState = 'success';
    setTimeout(() => {
      dot.style.display = '';
      dot.className = 'dot dot-red';
      txt.textContent = 'Launch Site';
      btn.disabled = false;
      launchState = 'idle';
    }, 2500);
  }, 1400);
}
</script>
</body>
</html>
