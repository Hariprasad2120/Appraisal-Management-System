<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #f4f6f9; font-family: var(--font-sans); display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .label { font-size: 10px; color: #9ca3af; font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; }
  .divider { width: 1px; height: 40px; background: #e5eaf1; }

  /* Logo on light */
  .logo-light { background: #fff; border: 1px solid #e5eaf1; padding: 16px 24px; display: flex; align-items: center; }
  /* Logo on dark */
  .logo-dark { background: #1a1c22; border: 1px solid rgba(255,255,255,0.07); padding: 16px 24px; display: flex; align-items: center; }
  /* Logo small */
  .logo-sm { background: #fff; border: 1px solid #e5eaf1; padding: 10px 16px; display: flex; align-items: center; }
</style>
</head>
<body>

<div>
  <div class="row">
    <div class="logo-light">
      <img src="../assets/Logo.png" alt="Adarsh Shipping & Services" style="height:48px;width:auto;object-fit:contain">
    </div>
    <div class="logo-dark">
      <img src="../assets/Logo.png" alt="Adarsh Shipping & Services" style="height:48px;width:auto;object-fit:contain">
    </div>
  </div>
  <div class="label">full logo — light & dark surfaces</div>
</div>

<div>
  <div class="row">
    <div class="logo-sm">
      <img src="../assets/Logo.png" alt="Adarsh Shipping & Services" style="height:28px;width:auto;object-fit:contain">
    </div>
    <div class="logo-sm" style="background:#f4f6f9">
      <img src="../assets/Logo.png" alt="Adarsh Shipping & Services" style="height:28px;width:auto;object-fit:contain">
    </div>
  </div>
  <div class="label">compact — sidebar header & mobile</div>
</div>

</body>
</html>
