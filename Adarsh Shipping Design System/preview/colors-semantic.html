<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: linear-gradient(135deg, #e0f5f5 0%, #f4f6f9 50%, #fff3e8 100%); font-family: var(--font-sans); display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }

  .glass-card {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(14px) saturate(1.6);
    -webkit-backdrop-filter: blur(14px) saturate(1.6);
    border: 1px solid rgba(255,255,255,0.75);
    border-bottom-color: rgba(200,220,240,0.4);
    border-right-color: rgba(200,220,240,0.4);
    box-shadow:
      0 2px 8px rgba(0,0,0,0.06),
      0 8px 24px rgba(0,0,0,0.05),
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -1px 0 rgba(180,210,230,0.3);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 110px;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .glass-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.95);
    box-shadow:
      0 4px 14px rgba(0,0,0,0.09),
      0 12px 32px rgba(0,0,0,0.07),
      inset 0 1px 0 rgba(255,255,255,0.98),
      inset 0 -1px 0 rgba(180,210,230,0.25),
      0 0 0 1px rgba(14,137,149,0.18),
      0 0 16px rgba(14,137,149,0.18),
      0 0 32px rgba(14,137,149,0.08);
  }

  .swatch { width: 100%; height: 36px; border-radius: 8px; }
  .name  { font-size: 11px; font-weight: 600; color: #1a2535; }
  .label { font-size: 10px; color: #6b7280; font-family: var(--font-mono); }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; margin-top: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 9999px; font-size: 11px; font-weight: 500;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 1px 4px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    cursor: default;
  }
  .chip:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.95);
    box-shadow:
      0 2px 8px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 0 0 1px rgba(14,137,149,0.15),
      0 0 10px rgba(14,137,149,0.15);
  }
</style>
</head>
<body>

<!-- Surface swatches -->
<div class="glass-card">
  <div class="swatch" style="background:rgba(255,255,255,0.9);border:1px solid rgba(228,234,242,0.8)"></div>
  <div class="name">Card</div><div class="label">--card · #ffffff</div>
</div>
<div class="glass-card">
  <div class="swatch" style="background:rgba(240,244,248,0.85)"></div>
  <div class="name">Muted</div><div class="label">--muted · #f0f4f8</div>
</div>
<div class="glass-card">
  <div class="swatch" style="background:rgba(240,244,248,0.85)"></div>
  <div class="name">Input</div><div class="label">--input · #f0f4f8</div>
</div>
<div class="glass-card">
  <div class="swatch" style="background:rgba(224,245,245,0.85)"></div>
  <div class="name">Accent</div><div class="label">--accent · #e0f5f5</div>
</div>
<div class="glass-card">
  <div class="swatch" style="background:rgba(229,234,241,0.7);border:1px dashed rgba(180,200,220,0.6)"></div>
  <div class="name">Border</div><div class="label">--border · #e5eaf1</div>
</div>

<!-- State chips row -->
<div class="chip-row">
  <span class="chip" style="background:rgba(224,245,245,0.7);color:#0e8a95;">Primary</span>
  <span class="chip" style="background:rgba(255,243,232,0.75);color:#ff8333;">Warning</span>
  <span class="chip" style="background:rgba(254,249,236,0.75);color:#d97706;">Amber</span>
  <span class="chip" style="background:rgba(220,252,231,0.75);color:#16a34a;">Success</span>
  <span class="chip" style="background:rgba(254,226,226,0.75);color:#ef4444;">Destructive</span>
  <span class="chip" style="background:rgba(240,244,248,0.75);color:#374151;">Muted</span>
</div>

</body>
</html>
